name: IceHost 代理智能续期

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */2 * * *' 

jobs:
  renew_job:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 检出主仓库代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # =======================================================
      # 改动1：把私库拉取到 hosting_repo 文件夹，避免路径嵌套
      - name: 拉取 icehost 私有文件夹
        uses: actions/checkout@v4
        with:
          repository: walx0705/hosting
          token: ${{ secrets.GH_TOKEN }}
          path: hosting_repo
      # =======================================================

      - name: 缓存 Playwright 二进制文件
        uses: actions/cache@v3
        with:
          path: ~/.cache/ms-playwright
          key: playwright-cache-${{ hashFiles('hosting_repo/icehost/requirements.txt') }}

      - name: 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装最小系统依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y xvfb libnss3 libasound2t64 libgbm1

      - name: 下载 Hysteria 二进制文件
        run: |
          wget --retry-connrefused --waitretry=3 --read-timeout=20 --timeout=15 -t 3 \
            https://github.com/apernet/hysteria/releases/latest/download/hysteria-linux-amd64 \
            -O hysteria
          chmod +x hysteria
          # 移动到对应的子文件夹下
          cp hysteria hosting_repo/icehost/hysteria

      # =======================================================
      # 改动2：依赖路径修正为 hosting_repo/icehost/requirements.txt
      - name: 安装 Python 依赖
        run: |
          pip install --upgrade -r hosting_repo/icehost/requirements.txt
          seleniumbase install chromium
          playwright install chromium
      # =======================================================

      # =======================================================
      # 改动3：先 cd 进入真正的脚本目录 hosting_repo/icehost 再运行
      - name: 在虚拟显示器中运行续期脚本
        env:
          PTERODACTYL_EMAIL: ${{ secrets.PTERODACTYL_EMAIL }}
          PTERODACTYL_PASSWORD: ${{ secrets.PTERODACTYL_PASSWORD }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          cd hosting_repo/icehost
          xvfb-run --auto-servernum python -u main.py
      # =======================================================

      # =======================================================
      # 改动4：在此目录下提交回私库
      - name: 提交 Cookie 和心跳文件到私库
        if: always()
        run: |
          cd hosting_repo/icehost
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull origin main --rebase || true
          git add session_cookies.json last_run.txt || true
          git commit -m "📅 自动更新会话 Cookie 和心跳" || echo "没有文件变更，跳过提交"
          git remote set-url origin https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/walx0705/hosting.git
          git push origin main
      # =======================================================

      - name: 🗑️ 彻底清理旧记录（保留最近5次）
        if: always()
        env:
          GH_TOKEN: ${{ secrets.WORKFLOW_CLEAN_TOKEN }}
        run: |
          runs=$(gh run list --repo "${{ github.repository }}" --workflow="IceHost 代理智能续期" --limit=50 --json databaseId --jq '.[].databaseId' || echo "")
          if [ -z "$runs" ]; then exit 0; fi
          count=0
          for run_id in $runs; do
            count=$((count + 1))
            if [ $count -gt 5 ]; then
              echo "🗑️ 删除旧记录: $run_id"
              gh run delete $run_id --repo "${{ github.repository }}" || true
            fi
          done
