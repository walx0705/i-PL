name: IceHost Proxy Smart Renew

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */2 * * *'

jobs:
  renew_job:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install TUIC Client (自动解析最新版本下载链接)
        run: |
          # 从 Release 页面抓取客户端下载链接
          DOWNLOAD_URL=$(curl -sL https://github.com/tuic-protocol/tuic/releases/latest | \
            grep -oP 'href="(/tuic-protocol/tuic/releases/download/[^"]*tuic-client[^"]*linux[^"]*)"' | \
            head -1 | sed 's/href="//;s/"//')
          # 补全域名
          FULL_URL="https://github.com${DOWNLOAD_URL}"
          echo "下载地址: $FULL_URL"
          wget --retry-connrefused --waitretry=3 --read-timeout=20 --timeout=15 -t 3 -O tuic-client "$FULL_URL"
          chmod +x tuic-client

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libnss3 libasound2t64 libgbm1
          pip install playwright seleniumbase requests pyvirtualdisplay
          playwright install --with-deps chromium
          seleniumbase install chromedriver

      - name: Run Script
        env:
          PTERODACTYL_EMAIL: ${{ secrets.PTERODACTYL_EMAIL }}
          PTERODACTYL_PASSWORD: ${{ secrets.PTERODACTYL_PASSWORD }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          TUIC_UUID: ${{ secrets.TUIC_UUID }}
          TUIC_PASSWORD: ${{ secrets.TUIC_PASSWORD }}
        run: xvfb-run --auto-servernum python -u main.py

      - name: Save Cookie & Heartbeat
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add session_cookies.json last_run.txt || true
          git commit -m "📅 Update Session & Heartbeat" || echo "No changes"
          git push

      - name: Cleanup old workflow runs
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: "IceHost Proxy Smart Renew"
          keep_minimum_runs: 5
