name: IceHost Proxy Smart Renew

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */3 * * *' 

jobs:
  renew_job:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write  # 必须加上这个权限，不然删不了 workflow 记录

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Hysteria
        run: |
          wget --retry-connrefused --waitretry=3 --read-timeout=20 --timeout=15 -t 3 https://github.com/apernet/hysteria/releases/latest/download/hysteria-linux-amd64 -O hysteria
          chmod +x hysteria

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libnss3 libasound2t64 libgbm1
          pip install playwright seleniumbase requests pyvirtualdisplay
          playwright install --with-deps chromium
          seleniumbase install chromedriver

      - name: Run Script
        env:
          PTERODACTYL_EMAIL: ${{ secrets.PTERODACTYL_EMAIL }}
          PTERODACTYL_PASSWORD: ${{ secrets.PTERODACTYL_PASSWORD }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: xvfb-run --auto-servernum python -u main.py

      - name: Save Cookie & Heartbeat
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # 检查 cookie 文件是否有变化，有则提交
          git add session_cookies.json last_run.txt || true
          git commit -m "📅 Update Session & Heartbeat" || echo "No changes"
          git push

      # --------------------------
      # 新增：自动清理旧运行记录
      # --------------------------
      - name: Cleanup old workflow runs
        if: always()  # 不管脚本成功失败都执行清理
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          workflow_id: "IceHost Proxy Smart Renew"  # 你的 workflow 名称
          keep_minimum_runs: 5  # 只保留最近5条记录，多余的自动删除
