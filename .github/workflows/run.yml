name: IceHost 代理智能续期

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */2 * * *' 

jobs:
  renew_job:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 缓存 Playwright 和 Python 虚拟环境
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/ms-playwright
            venv
          key: full-cache-${{ hashFiles('requirements.txt') }}

      - name: 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装最小系统依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y xvfb libnss3 libasound2t64 libgbm1

      - name: 下载 Hysteria 二进制文件
        run: |
          wget --retry-connrefused --waitretry=3 --read-timeout=20 --timeout=15 -t 3 \
            https://github.com/apernet/hysteria/releases/latest/download/hysteria-linux-amd64 \
            -O hysteria
          chmod +x hysteria

      - name: 安装 Python 依赖
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install --upgrade requests seleniumbase playwright
          seleniumbase install chromium
          playwright install chromium

      - name: 在虚拟显示器中运行续期脚本
        env:
          PTERODACTYL_EMAIL: ${{ secrets.PTERODACTYL_EMAIL }}
          PTERODACTYL_PASSWORD: ${{ secrets.PTERODACTYL_PASSWORD }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          source venv/bin/activate
          xvfb-run --auto-servernum python -u main.py

      - name: 保存 Cookie 和心跳文件
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull origin ${{ github.ref_name }} --rebase || true
          git add session_cookies.json last_run.txt || true
          git commit -m "📅 自动更新会话 Cookie 和心跳" || echo "没有文件变更，跳过提交"
          git push origin ${{ github.ref_name }} || echo "Git 推送冲突，跳过"

      - name: 🗑️ 彻底清理旧记录（保留最近5次）
        if: always()
        env:
          GH_TOKEN: ${{ secrets.WORKFLOW_CLEAN_TOKEN }}
        run: |
          echo "🔍 获取当前工作流的所有运行记录..."
          runs=$(gh run list --workflow="IceHost 代理智能续期" --limit=50 --json databaseId --jq '.[].databaseId' || echo "")
          
          if [ -z "$runs" ]; then
            echo "⚠️ 未找到任何记录。"
            exit 0
          fi

          count=0
          for run_id in $runs; do
            count=$((count + 1))
            if [ $count -gt 5 ]; then
              echo "🗑️ 正在删除旧记录: $run_id"
              gh run delete $run_id --force || echo "删除 $run_id 失败，跳过"
            else
              echo "✅ 保留最近的记录: $run_id"
            fi
          done
          echo "✨ 清理完成！"
