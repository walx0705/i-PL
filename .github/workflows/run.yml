name: IceHost Proxy Smart Renew

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */2 * * *' 

jobs:
  renew_job:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 统一缓存：浏览器依赖 + Python虚拟环境，解决venv缓存报错
      - name: Cache Playwright & Python venv
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/ms-playwright
            venv
          key: full-cache-${{ hashFiles('requirements.txt') }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          # 移除了废弃的 cache: 'venv'

      - name: Install minimal system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y xvfb libnss3 libasound2t64 libgbm1

      - name: Install Python dependencies
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install --upgrade requests seleniumbase
          seleniumbase install chromium

      - name: Run renew script with virtual display
        env:
          PTERODACTYL_EMAIL: ${{ secrets.PTERODACTYL_EMAIL }}
          PTERODACTYL_PASSWORD: ${{ secrets.PTERODACTYL_PASSWORD }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          source venv/bin/activate
          xvfb-run --auto-servernum python -u main.py

      - name: Save Cookie & Heartbeat file
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull origin ${{ github.ref_name }} --rebase || true
          git add session_cookies.json last_run.txt || true
          git commit -m "📅 Auto update session cookie & heartbeat" || echo "No file changes to commit"
          git push origin ${{ github.ref_name }} || echo "Git push conflict skipped"

      - name: Cleanup old workflow runs
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.WORKFLOW_CLEAN_TOKEN }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: "IceHost Proxy Smart Renew"
          keep_minimum_runs: 5
