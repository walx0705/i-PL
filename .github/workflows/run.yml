name: IceHost Renew Ultimate
on:
  schedule:
    - cron: '15 */5 * * *'
  workflow_dispatch:
jobs:
  run-task:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Setup Hysteria2 Shield
        run: |
          curl -Lo hy2 https://github.com/apernet/hysteria/releases/latest/download/hysteria-linux-amd64
          chmod +x hy2
          cat <<EOF > config.yaml
          server: 83.168.94.238:30045
          auth: 9afd1229-b893-40c1-84dd-51e7ce204913
          tls:
            sni: dash.icehost.pl
            insecure: true
          socks5:
            listen: 127.0.0.1:1080
          EOF
          # 后台静默运行并大幅增加初始休眠，确保握手彻底完成
          ./hy2 client -c config.yaml > hy2.log 2>&1 &
          sleep 40 

      - name: Prepare Playwright
        run: |
          pip install playwright requests
          playwright install chromium
          
      - name: Execute Bypass Script
        env:
          ICE_EMAIL: ${{ secrets.ICE_EMAIL }}
          ICE_PASSWORD: ${{ secrets.ICE_PASSWORD }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python main.py
