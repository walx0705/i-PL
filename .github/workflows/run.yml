Name: IceHost Proxy Smart Renew (UC Mode)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */3 * * *' 

jobs:
  renew_job:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Hysteria
        run: |
          wget https://github.com/apernet/hysteria/releases/latest/download/hysteria-linux-amd64 -O hysteria
          chmod +x hysteria

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          # 安装虚拟显示服务、浏览器依赖和 SeleniumBase
          sudo apt-get update
          sudo apt-get install -y xvfb libgconf-2-4 libnss3-dev libxss1 libasound2
          pip install seleniumbase requests pyvirtualdisplay
          # 关键：安装对应的浏览器驱动
          sbase install chromedriver

      - name: Run Script (with XVFB)
        env:
          PTERODACTYL_COOKIE: ${{ secrets.PTERODACTYL_COOKIE }}
          PTERODACTYL_EMAIL: ${{ secrets.PTERODACTYL_EMAIL }}
          PTERODACTYL_PASSWORD: ${{ secrets.PTERODACTYL_PASSWORD }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        # 使用 xvfb-run 来提供虚拟显示环境，这是 UC 模式在 Actions 上运行的关键
        run: xvfb-run --auto-servernum python -u main.py

      - name: Heartbeat
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "Last execution: $(date)" > last_run.txt
          git add last_run.txt
          git commit -m "📅 Notification Cleaned" || echo "No changes"
          git push
