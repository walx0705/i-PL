name: IceHost Force Renew
on:
  schedule:
    - cron: '30 */5 * * *'
  workflow_dispatch:
jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Setup Hy2
        run: |
          curl -Lo hy2 https://github.com/apernet/hysteria/releases/latest/download/hysteria-linux-amd64
          chmod +x hy2
          cat <<EOF > config.yaml
          server: 83.168.94.238:30045
          auth: 9afd1229-b893-40c1-84dd-51e7ce204913
          tls:
            sni: dash.icehost.pl
            insecure: true
          socks5:
            listen: 127.0.0.1:1080
          EOF
          ./hy2 client -c config.yaml > /dev/null 2>&1 &
          sleep 15
      - name: Install & Run
        run: |
          pip install playwright requests
          playwright install chromium
          python main.py
        env:
          ICE_EMAIL: ${{ secrets.ICE_EMAIL }}
          ICE_PASSWORD: ${{ secrets.ICE_PASSWORD }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
