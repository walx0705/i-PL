name: IceHost Proxy Smart Renew

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */2 * * *'   # 每2小时运行一次

jobs:
  renew_job:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install TUIC Client
        run: |
          wget --retry-connrefused --waitretry=3 --read-timeout=20 --timeout=15 -t 3 \
            -O tuic-client \
            "https://github.com/tuic-protocol/tuic/releases/download/tuic-server-1.0.0/tuic-client-1.0.0-x86_64-linux-gnu"
          chmod +x tuic-client

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libnss3 libasound2t64 libgbm1
          pip install playwright seleniumbase requests pyvirtualdisplay
          playwright install --with-deps chromium
          seleniumbase install chromedriver

      - name: Run Script
        env:
          PTERODACTYL_EMAIL: ${{ secrets.PTERODACTYL_EMAIL }}
          PTERODACTYL_PASSWORD: ${{ secrets.PTERODACTYL_PASSWORD }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          # TUIC 代理敏感变量（强烈建议设为 Secrets）
          TUIC_UUID: ${{ secrets.TUIC_UUID }}
          TUIC_PASSWORD: ${{ secrets.TUIC_PASSWORD }}
        run: xvfb-run --auto-servernum python -u main.py

      - name: Save Cookie & Heartbeat
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add session_cookies.json last_run.txt || true
          git commit -m "📅 Update Session & Heartbeat" || echo "No changes"
          git push

      - name: Cleanup old workflow runs
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: "IceHost Proxy Smart Renew"
          keep_minimum_runs: 5   # 只保留最近5条运行记录
