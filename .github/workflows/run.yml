name: IceHost Auto Renew
on:
  schedule:
    - cron: '30 */5 * * *'
  workflow_dispatch:
jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install Xray
        run: |
          wget https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          unzip -o Xray-linux-64.zip
          cat <<EOF > config.json
          {
            "inbounds": [{"port": 1080, "protocol": "socks", "settings": {"auth": "noauth"}}],
            "outbounds": [{
              "protocol": "vless",
              "settings": {
                "vnext": [{
                  "address": "mfa.gov.ua",
                  "port": 443,
                  "users": [{"id": "20e6e496-cf19-45c8-b883-14f5e11cd9f1", "encryption": "none"}]
                }]
              },
              "streamSettings": {
                "network": "ws",
                "security": "tls",
                "tlsSettings": {"serverName": "wzr.wjq.cc.cd"},
                "wsSettings": {"path": "/vless-argo?ed=256", "headers": {"Host": "wzr.wjq.cc.cd"}}
              }
            }]
          }
          EOF
          ./xray run -c config.json &
          sleep 5
      - name: Install Py
        run: |
          pip install playwright requests
          playwright install chromium
      - name: Run
        env:
          ICE_EMAIL: ${{ secrets.ICE_EMAIL }}
          ICE_PASSWORD: ${{ secrets.ICE_PASSWORD }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python main.py
