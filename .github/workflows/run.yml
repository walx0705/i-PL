name: IceHost Proxy Smart Renew

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */3 * * *' 

jobs:
  renew_job:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Hysteria
        run: |
          wget https://github.com/apernet/hysteria/releases/latest/download/hysteria-linux-amd64 -O hysteria
          chmod +x hysteria

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          # 适配 Ubuntu 24.04 的最新包名
          sudo apt-get install -y xvfb libnss3 libasound2t64 libgbm1
          pip install seleniumbase requests pyvirtualdisplay
          # 由 SeleniumBase 自动安装配套的浏览器和驱动
          seleniumbase install chrome
          seleniumbase install chromedriver

      - name: Run Script
        env:
          PTERODACTYL_EMAIL: ${{ secrets.PTERODACTYL_EMAIL }}
          PTERODACTYL_PASSWORD: ${{ secrets.PTERODACTYL_PASSWORD }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        # 必须使用 xvfb-run 来模拟图形界面以运行 UC 模式
        run: xvfb-run --auto-servernum python -u main.py

      - name: Heartbeat
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "Last execution: $(date)" > last_run.txt
          git add last_run.txt
          git commit -m "📅 Task Executed" || echo "No changes"
          git push
