name: IceHost Auto Renew

on:
  workflow_dispatch: # 允许手动触发测试
  schedule:
    # 使用两个 cron 表达式组合实现“每 90 分钟”运行一次 (UTC 时间)
    - cron: '0 0,3,6,9,12,15,18,21 * * *'
    - cron: '30 1,4,7,10,13,16,19,22 * * *'

jobs:
  renew_job:
    runs-on: ubuntu-latest
    timeout-minutes: 15 # 设置合理的超时时间

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' # 开启缓存加速依赖安装

      - name: Install dependencies
        run: |
          pip install playwright requests
          playwright install --with-deps chromium

      - name: Run Auto Renew Script
        env:
          # 面板凭据
          PTERODACTYL_COOKIE: ${{ secrets.PTERODACTYL_COOKIE }}
          PTERODACTYL_EMAIL: ${{ secrets.PTERODACTYL_EMAIL }}
          PTERODACTYL_PASSWORD: ${{ secrets.PTERODACTYL_PASSWORD }}
          # Telegram 通知凭据
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        # -u 确保 Python 的 print 日志能实时显示在 GitHub Actions 窗口
        run: python -u main.py

      - name: Upload Artifacts (Screenshots)
        if: always() # 无论脚本运行成功还是失败，都上传截图用于排查
        uses: actions/upload-artifact@v4
        with:
          name: execution-screenshots
          path: "*.png"
          retention-days: 3 # 截图保留3天，避免占用过多空间
