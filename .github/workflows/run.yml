name: IceHost Proxy Smart Renew

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */3 * * *' 

jobs:
  renew_job:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Hysteria
        run: |
          wget https://github.com/apernet/hysteria/releases/latest/download/hysteria-linux-amd64 -O hysteria
          chmod +x hysteria

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          # 必须安装的系统依赖，用于支持 UC 模式和虚拟显示
          sudo apt-get install -y xvfb libnss3 libasound2t64 libgbm1
          pip install seleniumbase requests pyvirtualdisplay
          # 安装浏览器和驱动
          seleniumbase install chrome
          seleniumbase install chromedriver

      - name: Run Script
        env:
          # 保持你原来的环境变量名不变
          PTERODACTYL_EMAIL: ${{ secrets.PTERODACTYL_EMAIL }}
          PTERODACTYL_PASSWORD: ${{ secrets.PTERODACTYL_PASSWORD }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        # 关键修改：使用 xvfb-run 启动，确保能模拟点击
        run: xvfb-run --auto-servernum python -u main.py

      - name: Heartbeat
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "Last execution: $(date)" > last_run.txt
          git add last_run.txt
          git commit -m "📅 Task Executed" || echo "No changes"
          git push
