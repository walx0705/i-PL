name: IceHost Auto Renew Enhanced

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */3 * * *' # 每 3 小时运行一次

jobs:
  renew_job:
    runs-on: ubuntu-latest
    # 授予权限以便 Action 可以提交代码回仓库
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright requests
          playwright install --with-deps chromium

      - name: Run Auto Renew Script
        env:
          PTERODACTYL_COOKIE: ${{ secrets.PTERODACTYL_COOKIE }}
          PTERODACTYL_EMAIL: ${{ secrets.PTERODACTYL_EMAIL }}
          PTERODACTYL_PASSWORD: ${{ secrets.PTERODACTYL_PASSWORD }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python -u main.py

      - name: Update time.txt and Commit
        if: always() # 无论脚本点击是否成功，都更新最后检查时间
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "最后检查时间: $(date +'%Y-%m-%d %H:%M:%S')" > time.txt
          git add time.txt
          git commit -m "📅 自动更新续期检查状态" || echo "无变化"
          git push

      - name: Upload error screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-logs
          path: "*.png"
