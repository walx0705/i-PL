name: IceHost 代理智能续期

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */2 * * *' 

jobs:
  renew_job:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 检出主仓库代码（用于下载 hysteria 到根目录）
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # =======================================================
      # 1. 拉取私库，直接存为 icehost 文件夹
      - name: 拉取私库 hosting 的 icehost 文件夹
        uses: actions/checkout@v4
        with:
          repository: walx0705/hosting
          token: ${{ secrets.GH_TOKEN }}
          path: icehost
      # =======================================================

      - name: 缓存 Playwright 和 Python 虚拟环境
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/ms-playwright
            venv
          key: full-cache-${{ hashFiles('icehost/requirements.txt') }}

      - name: 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装最小系统依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y xvfb libnss3 libasound2t64 libgbm1

      - name: 下载 Hysteria 二进制文件到根目录
        run: |
          wget --retry-connrefused --waitretry=3 --read-timeout=20 --timeout=15 -t 3 \
            https://github.com/apernet/hysteria/releases/latest/download/hysteria-linux-amd64 \
            -O hysteria
          chmod +x hysteria

      - name: 将 Hysteria 移动到私库目录中
        run: cp hysteria icehost/hysteria

      - name: 安装 Python 依赖 (读取私库中的 requirements.txt)
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install --upgrade -r icehost/requirements.txt
          seleniumbase install chromium
          playwright install chromium

      - name: 在私库目录内运行续期脚本
        env:
          PTERODACTYL_EMAIL: ${{ secrets.PTERODACTYL_EMAIL }}
          PTERODACTYL_PASSWORD: ${{ secrets.PTERODACTYL_PASSWORD }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          source venv/bin/activate
          # 关键：cd 进入私库文件夹运行，生成的 json/txt 会在私库文件夹里
          cd icehost
          xvfb-run --auto-servernum python -u main.py

      # =======================================================
      # 2. 提交更新到私库 (walx0705/hosting)
      - name: 提交 Cookie 和心跳文件到私库
        if: always()
        run: |
          cd icehost
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # 拉取上游最新代码防止冲突
          git pull origin main --rebase || true
          git add session_cookies.json last_run.txt || true
          git commit -m "📅 自动更新会话 Cookie 和心跳" || echo "没有文件变更，跳过提交"
          # 将远程仓库地址切换为带 token 的私库地址，并推送到 main
          git remote set-url origin https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/walx0705/hosting.git
          git push origin main
      # =======================================================

      # =======================================================
      # 3. 清理当前公开库的旧记录（加 --repo 避免找不到 .git 报错）
      - name: 🗑️ 彻底清理旧记录（保留最近5次）
        if: always()
        env:
          GH_TOKEN: ${{ secrets.WORKFLOW_CLEAN_TOKEN }}
        run: |
          runs=$(gh run list --repo "${{ github.repository }}" --workflow="IceHost 代理智能续期" --limit=50 --json databaseId --jq '.[].databaseId' || echo "")
          if [ -z "$runs" ]; then exit 0; fi
          count=0
          for run_id in $runs; do
            count=$((count + 1))
            if [ $count -gt 5 ]; then
              echo "🗑️ 删除旧记录: $run_id"
              gh run delete $run_id --repo "${{ github.repository }}" || true
            fi
          done
      # =======================================================
