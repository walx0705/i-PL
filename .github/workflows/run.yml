name: IceHost Auto Renew
on:
  schedule:
    - cron: '0 */5 * * *'
  workflow_dispatch:
jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install
        run: |
          pip install playwright requests
          playwright install chromium
      - name: Execute
        env:
          ICE_EMAIL: ${{ secrets.ICE_EMAIL }}
          ICE_PASSWORD: ${{ secrets.ICE_PASSWORD }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python main.py
