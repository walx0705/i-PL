name: IceHost Proxy Smart Renew

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */3 * * *'

permissions:
  contents: write
  actions: write

jobs:
  renew_job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Hysteria
        run: |
          wget --retry-connrefused --waitretry=3 --read-timeout=20 --timeout=15 -t 3 https://github.com/apernet/hysteria/releases/latest/download/hysteria-linux-amd64 -O hysteria
          chmod +x hysteria

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libnss3 libasound2t64 libgbm1
          pip install playwright seleniumbase requests pyvirtualdisplay
          playwright install --with-deps chromium
          seleniumbase install chromedriver

      - name: Run Renew Script
        env:
          USERNAME: ${{ secrets.USERNAME }}
          PASSWORD: ${{ secrets.PASSWORD }}
        run: |
          # 这里放你的 python 脚本运行命令，例如：
          # python renew.py
          echo "这里替换为你实际的运行命令"

      - name: Save Cookie & Heartbeat
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Update cookie and status [skip ci]" || exit 0
          git push

      - name: Cleanup old workflow runs
        uses: Mattraks/delete-workflow-runs@v2.5.0
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 5
