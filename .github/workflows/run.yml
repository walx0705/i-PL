name: IceHost Proxy Smart Renew

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */3 * * *' 

jobs:
  renew_job:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Hysteria
        run: |
          wget https://github.com/apernet/hysteria/releases/latest/download/hysteria-linux-amd64 -O hysteria
          chmod +x hysteria

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libnss3 libasound2t64 libgbm1
          # 同时安装两个框架的库
          pip install playwright seleniumbase requests pyvirtualdisplay
          # 安装两个框架所需的浏览器环境
          playwright install --with-deps chromium
          seleniumbase install chromedriver

      - name: Run Script
        env:
          PTERODACTYL_EMAIL: ${{ secrets.PTERODACTYL_EMAIL }}
          PTERODACTYL_PASSWORD: ${{ secrets.PTERODACTYL_PASSWORD }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          PTERODACTYL_COOKIE: ${{ secrets.PTERODACTYL_COOKIE }}
        run: xvfb-run --auto-servernum python -u main.py

      - name: Heartbeat
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "Last execution: $(date)" > last_run.txt
          git add last_run.txt
          git commit -m "📅 Notification Cleaned" || echo "No changes"
          git push
